<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>新聞列表</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .news { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 18px; }
        .date { color: gray; font-size: 12px; }
    </style>
</head>
<body>
<h2>新增新聞</h2>

<input id="title" placeholder="標題"><br><br>
<textarea id="content" placeholder="內容"></textarea><br><br>
<input id="date" type="date"><br><br>

<button onclick="addNews()">新增</button>
<h1>新聞列表</h1>
<div id="news-list"></div>

<script>
async function fetchNews() {
    try {
        const response = await fetch("http://localhost:8000/api/news/");
        const result = await response.json();

        const newsList = document.getElementById("news-list");
        newsList.innerHTML = "";

        result.data.forEach(item => {
            const div = document.createElement("div");
            div.className = "news";

            div.innerHTML = `
                <div class="title">${item.title}</div>
                <div class="date">${item.publish_date}</div>
                <div>${item.content}</div>
            `;

            newsList.appendChild(div);
        });

    } catch (error) {
        console.error("Error:", error);
    }
}

async function addNews() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    const publish_date = document.getElementById("date").value;

    const response = await fetch("http://localhost:8000/api/news/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title,
            content,
            publish_date
        })
    });

    const result = await response.json();
    console.log(result);

    alert("新增成功！");

    // 重新載入列表
    fetchNews();
}

fetchNews();
</script>

</body>
</html>
